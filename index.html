<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>服务状态 | AI Services</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg: #0a0a0f;
            --bg-card: #111118;
            --bg-card-hover: #16161f;
            --bg-elevated: #1a1a26;
            --border: rgba(255,255,255,0.06);
            --border-strong: rgba(255,255,255,0.12);

            --text-primary: #f0f0f8;
            --text-secondary: #8888aa;
            --text-muted: #4a4a6a;

            --green: #22c55e;
            --green-dim: rgba(34,197,94,0.1);
            --green-glow: rgba(34,197,94,0.25);

            --amber: #f59e0b;
            --amber-dim: rgba(245,158,11,0.1);

            --red: #ef4444;
            --red-dim: rgba(239,68,68,0.08);
            --red-glow: rgba(239,68,68,0.2);

            --blue: #6366f1;
            --blue-dim: rgba(99,102,241,0.1);

            --ease-expo: cubic-bezier(0.16, 1, 0.3, 1);
            --ease-spring: cubic-bezier(0.34, 1.56, 0.64, 1);
            --ease-smooth: cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }

        html { scroll-behavior: smooth; }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
            line-height: 1.5;
        }

        /* ── 背景装饰 ── */
        .bg-mesh {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }

        .bg-mesh::before {
            content: '';
            position: absolute;
            top: -30%;
            right: -20%;
            width: 800px;
            height: 800px;
            background: radial-gradient(circle, rgba(99,102,241,0.06) 0%, transparent 65%);
            animation: drift 20s ease-in-out infinite alternate;
        }

        .bg-mesh::after {
            content: '';
            position: absolute;
            bottom: -20%;
            left: -15%;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(239,68,68,0.05) 0%, transparent 65%);
            animation: drift 25s ease-in-out infinite alternate-reverse;
        }

        .bg-grid {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 0;
            background-image:
                linear-gradient(rgba(255,255,255,0.015) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.015) 1px, transparent 1px);
            background-size: 48px 48px;
            mask-image: radial-gradient(ellipse 80% 60% at 50% 0%, black 30%, transparent 100%);
        }

        @keyframes drift {
            from { transform: translate(0, 0) scale(1); }
            to   { transform: translate(40px, -30px) scale(1.05); }
        }

        /* ── 布局 ── */
        .container {
            max-width: 760px;
            margin: 0 auto;
            padding: 64px 24px 80px;
            position: relative;
            z-index: 1;
        }

        /* ── Header ── */
        .header {
            margin-bottom: 40px;
            animation: slideUp 0.7s var(--ease-expo) both;
        }

        .header-eyebrow {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 11px;
            font-weight: 500;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--text-muted);
            margin-bottom: 14px;
            font-family: 'JetBrains Mono', monospace;
        }

        .header-eyebrow::before {
            content: '';
            display: block;
            width: 16px;
            height: 1px;
            background: var(--text-muted);
        }

        h1 {
            font-size: clamp(28px, 5vw, 40px);
            font-weight: 700;
            letter-spacing: -0.04em;
            line-height: 1.1;
            color: var(--text-primary);
        }

        h1 span {
            background: linear-gradient(135deg, #a5b4fc 0%, #818cf8 50%, #6366f1 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .header-subtitle {
            margin-top: 10px;
            font-size: 14px;
            color: var(--text-muted);
        }

        /* ── 事故横幅 ── */
        .incident-banner {
            position: relative;
            border-radius: 14px;
            padding: 20px 24px;
            margin-bottom: 32px;
            overflow: hidden;
            border: 1px solid rgba(239,68,68,0.2);
            background: var(--red-dim);
            animation: slideUp 0.6s var(--ease-spring) 0.1s both;
        }

        .incident-banner.hidden { display: none; }

        .incident-banner::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(239,68,68,0.08) 0%, transparent 60%);
            pointer-events: none;
        }

        .incident-glow {
            position: absolute;
            top: -40px;
            right: -40px;
            width: 200px;
            height: 200px;
            background: radial-gradient(circle, rgba(239,68,68,0.15) 0%, transparent 70%);
            pointer-events: none;
        }

        .incident-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 6px;
        }

        .incident-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 3px 10px;
            border-radius: 100px;
            background: rgba(239,68,68,0.15);
            border: 1px solid rgba(239,68,68,0.3);
            font-size: 11px;
            font-weight: 600;
            color: #fca5a5;
            letter-spacing: 0.04em;
            text-transform: uppercase;
        }

        .pulse-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: #ef4444;
            animation: pulseDot 1.5s ease infinite;
        }

        @keyframes pulseDot {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(0.8); }
        }

        .incident-title {
            font-size: 15px;
            font-weight: 600;
            color: #fca5a5;
        }

        .incident-desc {
            font-size: 13px;
            color: rgba(252,165,165,0.7);
            line-height: 1.6;
            margin-bottom: 8px;
        }

        .incident-time {
            font-family: 'JetBrains Mono', monospace;
            font-size: 11px;
            color: rgba(239,68,68,0.5);
        }

        /* ── 统计卡片 ── */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-bottom: 32px;
            animation: slideUp 0.6s var(--ease-expo) 0.15s both;
        }

        .stat-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 16px 20px;
            position: relative;
            overflow: hidden;
            transition: border-color 0.3s, background 0.3s;
        }

        .stat-card:hover {
            border-color: var(--border-strong);
            background: var(--bg-card-hover);
        }

        .stat-card::before {
            content: '';
            position: absolute;
            bottom: 0; left: 0; right: 0;
            height: 2px;
            border-radius: 0 0 12px 12px;
            transition: opacity 0.3s;
        }

        .stat-card.green::before { background: var(--green); opacity: 0.5; }
        .stat-card.red::before   { background: var(--red);   opacity: 0.5; }
        .stat-card.blue::before  { background: var(--blue);  opacity: 0.5; }

        .stat-label {
            font-size: 11px;
            font-weight: 500;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            color: var(--text-muted);
            margin-bottom: 8px;
        }

        .stat-value {
            font-size: 28px;
            font-weight: 700;
            letter-spacing: -0.04em;
            line-height: 1;
            font-variant-numeric: tabular-nums;
        }

        .stat-value.green { color: var(--green); }
        .stat-value.red   { color: var(--red);   }
        .stat-value.blue  { color: var(--text-secondary); }

        .stat-sub {
            font-size: 11px;
            color: var(--text-muted);
            margin-top: 4px;
        }

        /* ── 状态总览条 ── */
        .status-bar-wrap {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 24px;
            animation: slideUp 0.6s var(--ease-expo) 0.2s both;
        }

        .status-indicator {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .status-ring {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .status-ring.operational { background: var(--green-dim); }
        .status-ring.incident    { background: var(--red-dim); }
        .status-ring.degraded    { background: var(--amber-dim); }

        .status-ring svg {
            width: 16px;
            height: 16px;
        }

        .status-ring::after {
            content: '';
            position: absolute;
            inset: -4px;
            border-radius: 50%;
            border: 1px solid currentColor;
            opacity: 0;
            animation: ringPulse 2.5s ease-out infinite;
        }

        .status-ring.incident { color: var(--red); }
        .status-ring.operational { color: var(--green); }

        @keyframes ringPulse {
            0%  { transform: scale(0.8); opacity: 0.8; }
            100% { transform: scale(1.6); opacity: 0; }
        }

        .status-text-wrap h2 {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-primary);
        }

        .status-text-wrap p {
            font-size: 12px;
            color: var(--text-muted);
            font-family: 'JetBrains Mono', monospace;
        }

        /* ── 筛选标签 ── */
        .filter-tabs {
            display: flex;
            gap: 6px;
            margin-bottom: 20px;
            animation: slideUp 0.6s var(--ease-expo) 0.25s both;
        }

        .filter-tab {
            padding: 6px 14px;
            border-radius: 100px;
            font-size: 12px;
            font-weight: 500;
            border: 1px solid var(--border);
            background: transparent;
            color: var(--text-muted);
            cursor: pointer;
            transition: all 0.2s var(--ease-expo);
            outline: none;
        }

        .filter-tab:hover {
            border-color: var(--border-strong);
            color: var(--text-secondary);
        }

        .filter-tab.active {
            background: rgba(255,255,255,0.06);
            border-color: rgba(255,255,255,0.15);
            color: var(--text-primary);
        }

        .filter-tab .count {
            display: inline-block;
            margin-left: 5px;
            padding: 1px 6px;
            border-radius: 100px;
            font-size: 10px;
            background: rgba(255,255,255,0.08);
        }

        .filter-tab.active .count.red-count {
            background: rgba(239,68,68,0.2);
            color: #fca5a5;
        }

        .filter-tab.active .count.green-count {
            background: rgba(34,197,94,0.15);
            color: #86efac;
        }

        /* ── 服务列表 ── */
        .services-container {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            overflow: hidden;
            animation: slideUp 0.6s var(--ease-expo) 0.3s both;
        }

        .service-item {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 14px 20px;
            border-bottom: 1px solid var(--border);
            transition: background 0.2s var(--ease-smooth);
            cursor: default;
            position: relative;
            overflow: hidden;
        }

        .service-item:last-child { border-bottom: none; }

        .service-item::before {
            content: '';
            position: absolute;
            left: 0; top: 0; bottom: 0;
            width: 3px;
            opacity: 0;
            transition: opacity 0.2s;
        }

        .service-item.down::before    { background: var(--red);   }
        .service-item.degraded::before { background: var(--amber); }
        .service-item.operational::before { background: var(--green); }

        .service-item:hover {
            background: var(--bg-card-hover);
        }

        .service-item:hover::before {
            opacity: 1;
        }

        .service-item.hidden-item {
            display: none;
        }

        /* 序号 */
        .service-index {
            font-family: 'JetBrains Mono', monospace;
            font-size: 11px;
            color: var(--text-muted);
            width: 24px;
            text-align: right;
            flex-shrink: 0;
            user-select: none;
        }

        /* 状态灯 */
        .service-icon {
            width: 20px;
            height: 20px;
            flex-shrink: 0;
            border-radius: 4px;
            object-fit: contain;
        }

        .service-led {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            flex-shrink: 0;
            position: relative;
        }

        .service-led.operational {
            background: var(--green);
            box-shadow: 0 0 6px var(--green-glow);
        }

        .service-led.degraded {
            background: var(--amber);
        }

        .service-led.down {
            background: var(--red);
            box-shadow: 0 0 6px var(--red-glow);
        }

        .service-led.down::after {
            content: '';
            position: absolute;
            inset: -3px;
            border-radius: 50%;
            border: 1px solid var(--red);
            opacity: 0;
            animation: ledPulse 2s ease-out infinite;
        }

        @keyframes ledPulse {
            0% { transform: scale(1); opacity: 0.8; }
            100% { transform: scale(2.5); opacity: 0; }
        }

        /* 服务信息 */
        .service-info {
            flex: 1;
            min-width: 0;
        }

        .service-name {
            font-size: 13px;
            font-weight: 600;
            color: var(--text-primary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            letter-spacing: -0.01em;
        }

        .service-desc {
            font-size: 11px;
            color: var(--text-muted);
            margin-top: 1px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* 状态标签 */
        .service-badge {
            flex-shrink: 0;
            display: inline-flex;
            align-items: center;
            gap: 5px;
            padding: 4px 10px;
            border-radius: 100px;
            font-size: 11px;
            font-weight: 500;
            letter-spacing: 0.02em;
            transition: transform 0.2s var(--ease-spring);
        }

        .service-item:hover .service-badge {
            transform: scale(1.05);
        }

        .service-badge.operational {
            background: rgba(34,197,94,0.1);
            color: #86efac;
            border: 1px solid rgba(34,197,94,0.15);
        }

        .service-badge.degraded {
            background: rgba(245,158,11,0.1);
            color: #fcd34d;
            border: 1px solid rgba(245,158,11,0.15);
        }

        .service-badge.down {
            background: rgba(239,68,68,0.1);
            color: #fca5a5;
            border: 1px solid rgba(239,68,68,0.15);
        }

        .service-badge svg {
            width: 10px;
            height: 10px;
        }

        /* 空状态 */
        .empty-state {
            padding: 48px 24px;
            text-align: center;
            color: var(--text-muted);
            font-size: 13px;
            display: none;
        }

        .empty-state.show { display: block; }

        /* ── Footer ── */
        footer {
            margin-top: 48px;
            text-align: center;
            animation: fadeIn 1s ease 0.8s both;
        }

        .footer-inner {
            display: inline-flex;
            align-items: center;
            gap: 16px;
        }

        .footer-dot {
            width: 3px;
            height: 3px;
            border-radius: 50%;
            background: var(--text-muted);
        }

        .footer-text {
            font-family: 'JetBrains Mono', monospace;
            font-size: 11px;
            color: var(--text-muted);
            letter-spacing: 0.04em;
        }

        /* ── 动画 ── */
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(16px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to   { opacity: 1; }
        }

        .service-item {
            opacity: 0;
            transform: translateY(8px);
            animation: slideUp 0.4s var(--ease-expo) both;
        }

        /* ── 响应式 ── */
        @media (max-width: 560px) {
            .container { padding: 40px 16px 60px; }
            .stats-grid { grid-template-columns: repeat(3, 1fr); gap: 8px; }
            .stat-card { padding: 12px 14px; }
            .stat-value { font-size: 22px; }
            .filter-tabs { flex-wrap: wrap; }
            .service-index { display: none; }
        }

        /* ── 滚动条 ── */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.12); }

        /* ── 公告栏 ── */
        .announcement-bar {
            background: rgba(34,197,94,0.1);
            border: 1px solid rgba(34,197,94,0.2);
            border-radius: 8px;
            padding: 10px 16px;
            margin-bottom: 24px;
            overflow: hidden;
            animation: slideUp 0.6s var(--ease-expo) 0.05s both;
        }

        .announcement-text {
            display: flex;
            align-items: center;
            white-space: nowrap;
            animation: scrollText 20s linear infinite;
        }

        .announcement-item {
            font-size: 12px;
            color: var(--text-primary);
            font-weight: 500;
            padding-right: 24px;
        }

        .announcement-separator {
            color: var(--text-muted);
            font-size: 12px;
            padding-right: 24px;
        }

        @keyframes scrollText {
            0% { transform: translateX(100%); }
            100% { transform: translateX(-100%); }
        }

        /* ── 模型卡片 ── */
        .model-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 16px 18px;
            margin-bottom: 10px;
            transition: border-color 0.2s, background 0.2s;
            position: relative;
            overflow: hidden;
            animation: slideUp 0.4s var(--ease-expo) both;
        }

        .model-card:hover {
            border-color: var(--border-strong);
            background: var(--bg-card-hover);
        }

        .model-card::before {
            content: '';
            position: absolute;
            left: 0; top: 0; bottom: 0;
            width: 3px;
            opacity: 0;
            transition: opacity 0.2s;
        }

        .model-card:hover::before { opacity: 1; }
        .model-card.down::before    { background: var(--red); }
        .model-card.degraded::before { background: var(--amber); }
        .model-card.operational::before { background: var(--green); }

        .model-card-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 10px;
        }

        .model-card-header .service-icon {
            width: 22px;
            height: 22px;
            flex-shrink: 0;
        }

        .model-name-wrap {
            flex: 1;
            min-width: 0;
        }

        .model-name {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-primary);
            letter-spacing: -0.01em;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .model-line-tag {
            font-size: 10px;
            font-weight: 500;
            padding: 1px 7px;
            border-radius: 100px;
            background: rgba(255,255,255,0.06);
            color: var(--text-muted);
            letter-spacing: 0.04em;
        }

        .model-stats-right {
            text-align: right;
            flex-shrink: 0;
        }

        .model-stat-value {
            font-size: 18px;
            font-weight: 700;
            letter-spacing: -0.03em;
            line-height: 1.1;
        }

        .model-stat-value.good  { color: var(--green); }
        .model-stat-value.warn  { color: var(--amber); }
        .model-stat-value.bad   { color: var(--red); }

        .model-stat-sub {
            font-size: 10px;
            color: var(--text-muted);
            margin-top: 1px;
            font-family: 'JetBrains Mono', monospace;
        }

        /* ── 色块时间线 ── */
        .model-timeline {
            display: flex;
            gap: 2px;
            margin: 8px 0;
            height: 18px;
        }

        .timeline-block {
            flex: 1;
            border-radius: 3px;
            min-width: 3px;
            transition: transform 0.15s, opacity 0.15s;
            position: relative;
        }

        .timeline-block:hover {
            transform: scaleY(1.3);
            z-index: 1;
        }

        .timeline-block.good  { background: rgba(34,197,94,0.55); }
        .timeline-block.warn  { background: rgba(245,158,11,0.55); }
        .timeline-block.bad   { background: rgba(239,68,68,0.55); }
        .timeline-block.empty { background: rgba(255,255,255,0.04); }

        .timeline-block[data-tip]:hover::after {
            content: attr(data-tip);
            position: absolute;
            bottom: calc(100% + 6px);
            left: 50%;
            transform: translateX(-50%);
            background: var(--bg-elevated);
            border: 1px solid var(--border-strong);
            border-radius: 6px;
            padding: 4px 8px;
            font-size: 10px;
            white-space: nowrap;
            color: var(--text-secondary);
            font-family: 'JetBrains Mono', monospace;
            pointer-events: none;
            z-index: 10;
        }

        .timeline-axis {
            display: flex;
            justify-content: space-between;
            font-size: 10px;
            color: var(--text-muted);
            font-family: 'JetBrains Mono', monospace;
            margin-top: 4px;
        }

        /* ── 汇总条 ── */
        .summary-bar {
            display: flex;
            align-items: center;
            gap: 16px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 12px 18px;
            margin-bottom: 24px;
            font-size: 12px;
            color: var(--text-secondary);
            font-family: 'JetBrains Mono', monospace;
        }

        .summary-bar strong {
            color: var(--text-primary);

function formatTime(iso) {
  return new Date(iso).toLocaleString('zh-CN', {
    month: '2-digit', day: '2-digit',
    hour: '2-digit', minute: '2-digit'
  });
}

function timeSince(iso) {
  const diff = Math.floor((Date.now() - new Date(iso)) / 60000);
  if (diff < 1)  return '刚刚';
  if (diff < 60) return `${diff} 分钟前`;
  const h = Math.floor(diff / 60), m = diff % 60;
  return m > 0 ? `${h} 小时 ${m} 分钟前` : `${h} 小时前`;
}

function fmtHourLabel(iso) {
  const d = new Date(iso);
  return `${String(d.getHours()).padStart(2,'0')}:00`;
}

/* ─── 数据获取与合并 ─── */
let currentFilter = 'all';

let lastFetchError = false;

function mergeServices(dynamicModels) {
  const base = FALLBACK_SERVICES.map(s => ({...s, hourly: []}));
  const byName = new Map();
  for (const s of base) {
    const key = s.name;
    if (!byName.has(key)) byName.set(key, []);
    byName.get(key).push(s);
    const lowerKey = key.toLowerCase();
    if (lowerKey !== key) {
      if (!byName.has(lowerKey)) byName.set(lowerKey, []);
      byName.get(lowerKey).push(s);
    }
  }

  for (const dm of dynamicModels || []) {
    const candidates = byName.get(dm.display_name) || byName.get(dm.display_name.toLowerCase()) || [];
    let svc = null;
    if (candidates.length === 1) {
      svc = candidates[0];
    } else if (candidates.length > 1) {
      svc = candidates.find(c => dm.line_label && c.line_label === dm.line_label) || candidates[0];
    }
    if (svc) {
      svc.status = dm.status;
      svc.total_requests = dm.total_requests;
      svc.success_rate = dm.success_rate;
      svc.avg_latency_ms = dm.avg_latency_ms;
      svc.is_dynamic = true;
      svc.brand = dm.brand;
      svc.line_label = dm.line_label || svc.line_label || "";
      if (dm.hourly) svc.hourly = dm.hourly;
    }
  }
  return base;
}

async function fetchModelHealth() {
  try {
    const resp = await fetch(GATEWAY_URL, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ endpoint: "model_health" }),
    });
    if (!resp.ok) return null;
    return await resp.json();
  } catch {
    return null;
  }
}

  const services = mergeServices(lastDynamicData?.models);
  const cntDown = services.filter(s => s.status === 'down').length;
  const cntDegraded = services.filter(s => s.status === 'degraded').length;
  const cntOk = services.filter(s => s.status === 'operational').length;
  const cntTotal = services.length;

  document.getElementById('stat-operational').textContent = cntOk;
  document.getElementById('stat-down').textContent = cntDown;
  document.getElementById('stat-total').textContent = cntTotal;

  document.getElementById('tab-all-count').textContent  = cntTotal;
  document.getElementById('tab-down-count').textContent = cntDown + cntDegraded;
  document.getElementById('tab-ok-count').textContent   = cntOk;

  const overallKey = services.some(s => s.status === 'down') ? 'incident'
                   : services.some(s => s.status === 'degraded') ? 'degraded'
                   : 'operational';
  const meta = statusMeta[overallKey];
  const ring = document.getElementById('status-ring');
  ring.className = `status-ring ${meta.ringClass}`;
  document.getElementById('status-icon').innerHTML = meta.iconSvg;
  document.getElementById('overall-status-text').textContent = meta.label;

  const banner = document.getElementById('incident-banner');
  if (overallKey === 'incident') {
    banner.classList.remove('hidden');
    document.getElementById('incident-title').textContent = '部分模型服务异常';
    document.getElementById('incident-desc').textContent =
      `检测到 ${cntDown} 个模型服务中断，${cntDegraded} 个性能降级`;
    document.getElementById('incident-time').textContent =
      `基于最近24小时请求数据 · ${lastDynamicData ? timeSince(lastDynamicData.generated_at) : '数据待更新'}`;
  } else if (overallKey === 'degraded') {
    banner.classList.remove('hidden');
    document.getElementById('incident-title').textContent = '部分模型性能降级';
    document.getElementById('incident-desc').textContent =

    document.getElementById('incident-time').textContent =
      `基于最近24小时请求数据 · ${lastDynamicData ? timeSince(lastDynamicData.generated_at) : '数据待更新'}`;
  } else {
    banner.classList.add('hidden');
  }

  /* 汇总条 */
  let totalReqAll = 0, totalSuccessAll = 0;
  for (const s of services) {
    if (s.is_dynamic && s.total_requests != null) {
      totalReqAll += s.total_requests;
      totalSuccessAll += Math.round(s.total_requests * (s.success_rate || 0) / 100);
    }
  }
  const avgSuccessAll = totalReqAll > 0 ? Math.round((totalSuccessAll / totalReqAll) * 100) : 0;
  const summaryBar = document.getElementById('summary-bar');
  if (summaryBar) {
    summaryBar.innerHTML = `
      <span><strong>${totalReqAll.toLocaleString()}</strong> 总请求</span>
      <span class="footer-dot"></span>
      <span><strong>${avgSuccessAll}%</strong> 平均成功率</span>
      <span class="footer-dot"></span>
      <span><span class="summary-dot" style="background:var(--green)"></span> ${cntOk} 正常</span>
      <span><span class="summary-dot" style="background:var(--amber)"></span> ${cntDegraded} 降级</span>
      <span><span class="summary-dot" style="background:var(--red)"></span> ${cntDown} 中断</span>
      <span style="margin-left:auto">${lastDynamicData ? timeSince(lastDynamicData.generated_at) + ' 更新' : '数据待更新'}</span>
    `;
  }

  renderList(services);
}

    empty.classList.add('show');
  } else {
    empty.classList.remove('show');
    filtered.forEach((svc, i) => {
      const el = document.createElement('div');
      el.className = `model-card ${svc.status}`;
      el.style.animationDelay = `${0.2 + i * 0.03}s`;

      const iconSrc = svc.icon || BRAND_ICONS[svc.brand] || '';
      const lineTag = svc.line_label || '';

      const statValClass = svc.status === 'down' ? 'bad' : svc.status === 'degraded' ? 'warn' : 'good';
      const srText = svc.is_dynamic && svc.success_rate != null ? `${svc.success_rate}%` : '--';
      const reqText = svc.is_dynamic && svc.total_requests != null ? `${svc.total_requests.toLocaleString()}次` : '--';
      const latText = svc.is_dynamic && svc.avg_latency_ms != null ? `${svc.avg_latency_ms}ms` : '--';

      let timelineHtml = '';
      if (svc.hourly && svc.hourly.length > 0) {
        const blocks = svc.hourly.map(h => {
          if (h.total === 0) return '<div class="timeline-block empty"></div>';
          const cls = h.success_rate >= 90 ? 'good' : h.success_rate >= 50 ? 'warn' : 'bad';
          const tip = `${fmtHourLabel(h.hour)} · 成功率 ${h.success_rate}% · ${h.total}次 · 延迟 ${h.avg_latency_ms}ms`;
          return `<div class="timeline-block ${cls}" data-tip="${tip}"></div>`;
        }).join('');
        timelineHtml = `
          <div class="model-timeline">${blocks}</div>
          <div class="timeline-axis">
            <span>24小时前</span>
            <span>12小时前</span>
            <span>现在</span>
          </div>
        `;
      } else {
        timelineHtml = `
          <div class="model-timeline">${Array(24).fill('<div class="timeline-block empty"></div>').join('')}</div>
          <div class="timeline-axis"><span>24小时前</span><span>12小时前</span><span>现在</span></div>
        `;
      }

      el.innerHTML = `
        <div class="model-card-header">
          ${iconSrc ? `<img class="service-icon" src="${iconSrc}" alt="" onerror="this.style.display='none'">` : ''}
          <div class="model-name-wrap">
            <div class="model-name">
              ${svc.name}
              ${lineTag ? `<span class="model-line-tag">${lineTag}</span>` : ''}
            </div>
          </div>
          <div class="model-stats-right">
            <div class="model-stat-value ${statValClass}">${srText}</div>
            <div class="model-stat-sub">${reqText} · ${latText}</div>
          </div>
        </div>
        ${timelineHtml}
      `;
      list.appendChild(el);
    });
  }
}

/* ─── 筛选交互 ─── */
document.getElementById('filter-tabs').addEventListener('click', e => {
  const btn = e.target.closest('.filter-tab');
  if (!btn) return;
  document.querySelectorAll('.filter-tab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentFilter = btn.dataset.filter;
  renderPage();
});

/* ─── 刷新循环 ─── */
async function refreshData() {
  const data = await fetchModelHealth();
  if (data) {
    lastDynamicData = data;
    lastFetchError = false;
  } else {
    lastFetchError = true;
  }
  renderPage();
}

/* ─── 启动 ─── */
refreshData();
setInterval(refreshData, 30000);
</script>
