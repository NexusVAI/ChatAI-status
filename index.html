<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>服务状态 | AI Services</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --ease-out-expo: cubic-bezier(0.16, 1, 0.3, 1);
            --ease-spring: cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #ffffff;
            color: #1a1a1a;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        .gradient-orb {
            position: fixed;
            width: 600px;
            height: 600px;
            border-radius: 50%;
            filter: blur(120px);
            opacity: 0;
            animation: fadeIn 1.2s var(--ease-out-expo) forwards;
            pointer-events: none;
        }

        .gradient-orb.orb-1 {
            top: -200px;
            right: -200px;
            background: radial-gradient(circle, rgba(248, 250, 252, 0.8) 0%, rgba(255, 255, 255, 0) 70%);
        }

        .gradient-orb.orb-2 {
            bottom: -300px;
            left: -200px;
            background: radial-gradient(circle, rgba(243, 244, 246, 0.6) 0%, rgba(255, 255, 255, 0) 70%);
        }

        @keyframes fadeIn {
            to { opacity: 1; }
        }

        .container {
            max-width: 720px;
            margin: 0 auto;
            padding: 80px 24px;
            width: 100%;
            position: relative;
            z-index: 1;
        }

        header {
            margin-bottom: 48px;
            opacity: 0;
            transform: translateY(20px);
            animation: slideUp 0.8s var(--ease-out-expo) 0.1s forwards;
        }

        h1 {
            font-size: 32px;
            font-weight: 600;
            letter-spacing: -0.03em;
            margin-bottom: 8px;
            background: linear-gradient(135deg, #1a1a1a 0%, #4b5563 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .subtitle {
            font-size: 15px;
            color: #9ca3af;
            font-weight: 400;
            letter-spacing: 0.01em;
        }

        .incident-banner {
            background: linear-gradient(135deg, #fef2f2 0%, #fff5f5 100%);
            border: 1px solid #fecaca;
            border-radius: 12px;
            padding: 20px 24px;
            margin-bottom: 40px;
            opacity: 0;
            transform: translateY(20px) scale(0.98);
            animation: slideUpSpring 0.7s var(--ease-spring) 0.2s forwards;
        }

        .incident-banner.hidden {
            display: none;
        }

        .incident-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 8px;
        }

        .incident-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #ef4444;
            animation: pulseRed 2s ease-in-out infinite;
        }

        @keyframes pulseRed {
            0%, 100% { opacity: 1; box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.4); }
            50% { opacity: 0.8; box-shadow: 0 0 0 8px rgba(239, 68, 68, 0); }
        }

        .incident-title {
            font-size: 15px;
            font-weight: 600;
            color: #991b1b;
        }

        .incident-desc {
            font-size: 14px;
            color: #b91c1c;
            margin-left: 20px;
            line-height: 1.5;
        }

        .incident-time {
            font-size: 12px;
            color: #f87171;
            margin-left: 20px;
            margin-top: 6px;
            font-variant-numeric: tabular-nums;
        }

        .status-overview {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 40px;
            padding-bottom: 24px;
            border-bottom: 1px solid #f3f4f6;
            opacity: 0;
            transform: translateY(20px);
            animation: slideUp 0.8s var(--ease-out-expo) 0.3s forwards;
        }

        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #22c55e;
            position: relative;
        }

        .status-dot::after {
            content: '';
            position: absolute;
            inset: -4px;
            border-radius: 50%;
            border: 1px solid #22c55e;
            opacity: 0;
            animation: ripple 2s ease-out infinite;
        }

        .status-dot.degraded {
            background: #f59e0b;
        }

        .status-dot.degraded::after {
            border-color: #f59e0b;
        }

        .status-dot.down {
            background: #ef4444;
        }

        .status-dot.down::after {
            border-color: #ef4444;
            animation: rippleRed 2s ease-out infinite;
        }

        @keyframes ripple {
            0% { transform: scale(0.5); opacity: 1; }
            100% { transform: scale(2); opacity: 0; }
        }

        @keyframes rippleRed {
            0%, 100% { transform: scale(0.5); opacity: 1; }
            50% { transform: scale(2); opacity: 0; }
        }

        .status-text {
            font-size: 15px;
            font-weight: 500;
            color: #374151;
        }

        .last-updated {
            margin-left: auto;
            font-size: 13px;
            color: #9ca3af;
            font-variant-numeric: tabular-nums;
        }

        .services {
            display: flex;
            flex-direction: column;
            gap: 0;
        }

        .service {
            padding: 18px 0;
            border-bottom: 1px solid #f9fafb;
            display: flex;
            align-items: center;
            justify-content: space-between;
            opacity: 0;
            transform: translateX(-10px);
            animation: slideInRight 0.6s var(--ease-out-expo) forwards;
            transition: all 0.3s var(--ease-out-expo);
        }

        .service:nth-child(1) { animation-delay: 0.35s; }
        .service:nth-child(2) { animation-delay: 0.4s; }
        .service:nth-child(3) { animation-delay: 0.45s; }
        .service:nth-child(4) { animation-delay: 0.5s; }
        .service:nth-child(5) { animation-delay: 0.55s; }

        @keyframes slideInRight {
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        @keyframes slideUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes slideUpSpring {
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .service:hover {
            padding-left: 8px;
            color: #6b7280;
        }

        .service-info {
            display: flex;
            flex-direction: column;
            gap: 3px;
        }

        .service-name {
            font-size: 14px;
            font-weight: 500;
            color: #1f2937;
            letter-spacing: -0.01em;
        }

        .service:hover .service-name {
            color: #111827;
        }

        .service-desc {
            font-size: 12px;
            color: #9ca3af;
            font-weight: 400;
        }

        .service-status {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            font-weight: 500;
            transition: transform 0.2s var(--ease-spring);
        }

        .service:hover .service-status {
            transform: translateX(4px);
        }

        .service-status.operational {
            color: #16a34a;
        }

        .service-status.degraded {
            color: #d97706;
        }

        .service-status.down {
            color: #dc2626;
        }

        .status-icon {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            transition: transform 0.3s var(--ease-spring);
        }

        .service:hover .status-icon {
            transform: scale(1.3);
        }

        .status-icon.operational {
            background: #22c55e;
        }

        .status-icon.degraded {
            background: #f59e0b;
        }

        .status-icon.down {
            background: #ef4444;
        }

        footer {
            margin-top: auto;
            padding: 32px 24px;
            text-align: center;
            opacity: 0;
            animation: fadeIn 1s ease 1s forwards;
        }

        .footer-text {
            font-size: 12px;
            color: #d1d5db;
            letter-spacing: 0.02em;
        }

        @media (max-width: 640px) {
            .container {
                padding: 48px 20px;
            }
            
            h1 {
                font-size: 26px;
            }

            .gradient-orb {
                width: 400px;
                height: 400px;
                filter: blur(80px);
            }
        }
    </style>
</head>
<body>
    <div class="gradient-orb orb-1"></div>
    <div class="gradient-orb orb-2"></div>

    <div class="container">
        <header>
            <h1>服务状态</h1>
            <p class="subtitle">AI 服务实时运行状态</p>
        </header>

        <div class="incident-banner hidden" id="incident-banner">
            <div class="incident-header">
                <div class="incident-dot"></div>
                <span class="incident-title" id="incident-title">正在调查</span>
            </div>
            <p class="incident-desc" id="incident-desc"></p>
            <p class="incident-time" id="incident-time"></p>
        </div>

        <div class="status-overview">
            <div class="status-dot" id="overall-dot"></div>
            <span class="status-text" id="overall-status">加载中...</span>
            <span class="last-updated" id="last-updated"></span>
        </div>

        <div class="services" id="services-list">
        </div>
    </div>

    <footer>
        <p class="footer-text">手动更新 · 仅供内部使用</p>
    </footer>

    <script>
        // 在这里直接修改状态数据
        const STATUS_DATA = {
            "lastUpdated": "2026-04-30T19:59:00+08:00",
            "overallStatus": "incident",
            "incident": {
                "title": "后端服务异常",
                "description": "工作人员正在排查问题中",
                "startedAt": "2026-04-30T19:59:00+08:00"
            },
            "services": [
                { "name": "DeepSeek-V4-Flash", "description": "闪电 · 快速 · 线路一", "status": "down" },
                { "name": "DeepSeek-V4-Flash", "description": "闪电 · 快速 · 线路三", "status": "down" },
                { "name": "DeepSeek-V4-Pro", "description": "Pro研究级模型", "status": "down" },
                { "name": "Step-3.5", "description": "阶跃星辰 · 快准狠", "status": "down" },
                { "name": "混元3", "description": "国产腾讯旗下最新AI · 低限额", "status": "down" },
                { "name": "chatGPT-OSS", "description": "OpenAI · 慢", "status": "down" },
                { "name": "Nemotron-3-super", "description": "英伟达", "status": "down" },
                { "name": "ling-2.6", "description": "蚂蚁集团百灵 · 大多数", "status": "down" },
                { "name": "spark-x2", "description": "星火推理模型", "status": "down" },
                { "name": "DeepSeek-R1", "description": "强推理", "status": "down" },
                { "name": "Qwen-3.5", "description": "多模态 · 全能型AI", "status": "down" },
                { "name": "Qwen3-Coder", "description": "多模态 · 编码专项", "status": "down" },
                { "name": "Kimi-K2.5", "description": "多模态 · 复杂任务处理", "status": "down" },
                { "name": "Kimi-K2.6", "description": "多模态 · 超复杂编程", "status": "down" },
                { "name": "GLM-5", "description": "深度编程", "status": "down" },
                { "name": "GLM-5.1", "description": "复杂编码处理 · 线路一", "status": "down" },
                { "name": "GLM-5.1", "description": "复杂编码处理 · 线路三", "status": "down" },
                { "name": "qwen3.6-max-preview", "description": "预览", "status": "down" },
                { "name": "qwen3.6-plus", "description": "多模态 · 均衡之选", "status": "down" },
                { "name": "MiniMax-M2.5", "description": "新 · 性价比之选 快速", "status": "down" }
            ]
        };

        function renderStatus() {
            const data = STATUS_DATA;
            
            document.getElementById('last-updated').textContent = 
                '更新于 ' + new Date(data.lastUpdated).toLocaleString('zh-CN', {
                    month: '2-digit',
                    day: '2-digit',
                    hour: '2-digit',
                    minute: '2-digit'
                });
            
            const incidentBanner = document.getElementById('incident-banner');
            if (data.incident && data.overallStatus === 'incident') {
                incidentBanner.classList.remove('hidden');
                document.getElementById('incident-title').textContent = data.incident.title;
                document.getElementById('incident-desc').textContent = data.incident.description;
                
                const startTime = new Date(data.incident.startedAt);
                const now = new Date();
                const diff = Math.floor((now - startTime) / 1000 / 60);
                const timeText = diff < 1 ? '刚刚发生' : 
                    diff < 60 ? `${diff} 分钟前` :
                    `${Math.floor(diff / 60)} 小时 ${diff % 60} 分钟前`;
                document.getElementById('incident-time').textContent = 
                    `${startTime.toLocaleString('zh-CN')} 开始 · 已持续 ${timeText}`;
            } else {
                incidentBanner.classList.add('hidden');
            }
            
            const servicesList = document.getElementById('services-list');
            servicesList.innerHTML = '';
            
            let allOperational = true;
            let hasDown = false;
            
            data.services.forEach((service, index) => {
                if (service.status !== 'operational') allOperational = false;
                if (service.status === 'down') hasDown = true;
                
                const serviceEl = document.createElement('div');
                serviceEl.className = 'service';
                serviceEl.style.animationDelay = `${0.35 + index * 0.05}s`;
                serviceEl.innerHTML = `
                    <div class="service-info">
                        <span class="service-name">${service.name}</span>
                        ${service.description ? `<span class="service-desc">${service.description}</span>` : ''}
                    </div>
                    <div class="service-status ${service.status}">
                        <span class="status-icon ${service.status}"></span>
                        <span>${getStatusText(service.status)}</span>
                    </div>
                `;
                servicesList.appendChild(serviceEl);
            });
            
            const overallDot = document.getElementById('overall-dot');
            const overallStatus = document.getElementById('overall-status');
            
            if (allOperational) {
                overallDot.className = 'status-dot';
                overallStatus.textContent = '所有服务正常运行';
            } else if (hasDown) {
                overallDot.className = 'status-dot down';
                overallStatus.textContent = '服务中断';
            } else {
                overallDot.className = 'status-dot degraded';
                overallStatus.textContent = '部分服务降级';
            }
        }
        
        function getStatusText(status) {
            const texts = {
                operational: '正常运行',
                degraded: '性能降级',
                down: '服务中断'
            };
            return texts[status] || status;
        }
        
        renderStatus();
    </script>
</body>
</html>
